name: Factory Open Targets Bulk

# Cycle 23 PR-OT-1 (probe-only infra) + PR-OT-3 (quarterly ingest).
# Manual dispatch only. Cron deferred to PR-OT-5.
#
# Two jobs:
#   probe   - PR-OT-1 release discovery + DuckDB DESCRIBE smoke test
#   ingest  - PR-OT-3 drug_molecule full extract + zstd + R2 upload
#
# The probe job validated the parquet-duckdb-bulk pipeline pattern and
# corrected two foundation-doc assumptions (GCS endpoint requester-pays,
# OT 25.03+ drug-table split). PR-OT-3 ingest reuses release discovery
# and DuckDB install logic but extracts the full corpus instead of a
# single partition.

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'OT release version (blank = auto-detect latest from EBI mirror)'
        required: false
        default: ''
      dry_run:
        description: 'Dry-run ingest (no R2 writes)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: read

env:
  R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install deps
        run: npm ci
      - name: Discover latest release + datasets
        run: node scripts/factory/open-targets-probe.js | tee /tmp/ot-probe.json
      - name: Install DuckDB CLI
        run: |
          set -e
          curl -sL https://github.com/duckdb/duckdb/releases/download/v1.1.3/duckdb_cli-linux-amd64.zip -o /tmp/duckdb.zip
          unzip -q /tmp/duckdb.zip -d /tmp
          /tmp/duckdb --version
      - name: Probe drug_molecule Parquet schema
        run: |
          set -e
          RELEASE=$(node -e "console.log(require('/tmp/ot-probe.json').latest_release)")
          echo "Using release: ${RELEASE}"
          BASE="https://ftp.ebi.ac.uk/pub/databases/opentargets/platform/${RELEASE}/output/drug_molecule"
          FNAME=$(curl -sL "${BASE}/" | grep -oE 'part-[a-z0-9-]+-c000\.snappy\.parquet' | head -1)
          if [ -z "$FNAME" ]; then
            echo "::error::no Parquet part files found in ${BASE}/"
            exit 1
          fi
          echo "First part file: ${FNAME}"
          curl -sL -o /tmp/drug_molecule.parquet "${BASE}/${FNAME}"
          ls -la /tmp/drug_molecule.parquet
          echo "--- DESCRIBE ---"
          /tmp/duckdb -c "DESCRIBE SELECT * FROM '/tmp/drug_molecule.parquet';"
          echo "--- ROW COUNT (1 partition) ---"
          /tmp/duckdb -c "SELECT COUNT(*) AS rows FROM '/tmp/drug_molecule.parquet';"
          echo "--- 3 SAMPLE ROWS ---"
          /tmp/duckdb -c "SELECT * FROM '/tmp/drug_molecule.parquet' LIMIT 3;"
      - name: Probe additional OT drug-side table schemas (PR-OT-3b + PR-OT-3b2)
        # PR-OT-3b: probe drug-side tables drug_mechanism_of_action + drug_warning
        # (drug_indication + known_drug returned HTTP 404 in PR-OT-3b dispatch on
        # 26.03; root-cause: tables renamed and restructured into the clinical_*
        # family per the third foundation-doc correction in this cascade — see
        # tracker §3 detail + brain memo entry 2026-05-24 continuation 3).
        #
        # PR-OT-3b2: extends the probe to the clinical_* family that replaced
        # drug_indication + known_drug:
        #   - clinical_indication (drug -> disease via clinical evidence)
        #   - clinical_report (clinical study / report metadata)
        #   - clinical_target (drug -> target via clinical evidence)
        # The keep-going tables (drug_mechanism_of_action + drug_warning) stay in
        # the loop for self-documentation; the dead names (drug_indication +
        # known_drug) are dropped because the probe would always emit 404 warnings
        # and pollute the report.
        run: |
          set -e
          RELEASE=$(node -e "console.log(require('/tmp/ot-probe.json').latest_release)")
          BASE="https://ftp.ebi.ac.uk/pub/databases/opentargets/platform/${RELEASE}/output"
          TABLES="drug_mechanism_of_action drug_warning clinical_indication clinical_report clinical_target"
          for table in $TABLES; do
            echo ""
            echo "============================================"
            echo "=== Probing ${table}"
            echo "============================================"
            FNAME=$(curl -sL "${BASE}/${table}/" | grep -oE 'part-[a-z0-9-]+-c000\.snappy\.parquet' | head -1)
            if [ -z "$FNAME" ]; then
              echo "::warning::no Parquet part files in ${table}; OT ${RELEASE} may not expose this dataset"
              continue
            fi
            curl -sL -o "/tmp/${table}.parquet" "${BASE}/${table}/${FNAME}"
            ls -la "/tmp/${table}.parquet"
            echo "--- ${table} DESCRIBE ---"
            /tmp/duckdb -c "DESCRIBE SELECT * FROM '/tmp/${table}.parquet';"
            echo "--- ${table} ROW COUNT (1 partition) ---"
            /tmp/duckdb -c "SELECT COUNT(*) AS rows FROM '/tmp/${table}.parquet';"
            echo "--- ${table} 2 SAMPLE ROWS ---"
            /tmp/duckdb -c "SELECT * FROM '/tmp/${table}.parquet' LIMIT 2;"
          done
      - name: Probe report summary
        if: always()
        run: |
          echo "## Open Targets PR-OT-1 probe report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat /tmp/ot-probe.json >> $GITHUB_STEP_SUMMARY || echo '{"error": "probe did not run"}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install deps
        run: npm ci
      - name: Resolve release version
        id: release
        run: |
          set -e
          INPUT="${{ github.event.inputs.release_version }}"
          if [ -n "$INPUT" ]; then
            RELEASE="$INPUT"
            echo "Using provided release: ${RELEASE}"
          else
            node scripts/factory/open-targets-probe.js > /tmp/ot-probe.json
            RELEASE=$(node -e "console.log(require('/tmp/ot-probe.json').latest_release)")
            echo "Auto-detected latest release: ${RELEASE}"
          fi
          echo "release=${RELEASE}" >> $GITHUB_OUTPUT
      - name: Install DuckDB CLI + zstd
        run: |
          set -e
          curl -sL https://github.com/duckdb/duckdb/releases/download/v1.1.3/duckdb_cli-linux-amd64.zip -o /tmp/duckdb.zip
          unzip -q /tmp/duckdb.zip -d /tmp
          /tmp/duckdb --version
          # PR-OT-3a hotfix: native zstd CLI for compression. zstd-codec
          # WASM fallback OOMs on ~16MB inputs (drug_molecule 26.03 size).
          # Rust FFI in lib/zstd-helper.js is not built in GHA ubuntu-latest.
          sudo apt-get update -qq
          sudo apt-get install -y -qq zstd
          zstd --version
      - name: Download drug_molecule Parquet partitions
        run: |
          set -e
          mkdir -p /tmp/dm
          BASE="https://ftp.ebi.ac.uk/pub/databases/opentargets/platform/${{ steps.release.outputs.release }}/output/drug_molecule"
          curl -sL "${BASE}/" | grep -oE 'part-[a-z0-9-]+-c000\.snappy\.parquet' | sort -u | while read fname; do
            echo "Downloading ${fname}"
            curl -sL -o "/tmp/dm/${fname}" "${BASE}/${fname}"
          done
          ls -la /tmp/dm/
          COUNT=$(ls /tmp/dm/*.parquet | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::no Parquet partitions downloaded"
            exit 1
          fi
          echo "Downloaded ${COUNT} partition file(s)"
      - name: Extract Parquet -> JSONL via DuckDB
        run: |
          set -e
          /tmp/duckdb -c "COPY (SELECT * FROM '/tmp/dm/*.snappy.parquet') TO '/tmp/drug-molecule.jsonl' (FORMAT JSON, ARRAY false);"
          LINES=$(wc -l < /tmp/drug-molecule.jsonl)
          echo "JSONL lines: ${LINES}"
          if [ "$LINES" -eq 0 ]; then
            echo "::error::DuckDB extract produced zero lines"
            exit 1
          fi
          head -1 /tmp/drug-molecule.jsonl | head -c 500
          echo ""
      - name: Transform + upload to R2
        run: |
          set -e
          ARGS="--jsonl=/tmp/drug-molecule.jsonl --release=${{ steps.release.outputs.release }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/factory/open-targets-harvest.js $ARGS
      - name: Ingest report summary
        if: always()
        run: |
          echo "## OT Ingest report (release ${{ steps.release.outputs.release }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/drug-molecule.jsonl ]; then
            echo "- JSONL lines: $(wc -l < /tmp/drug-molecule.jsonl)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- Dry-run: ${{ github.event.inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
          echo "- R2 key: processed/bulk/open-targets/${{ steps.release.outputs.release }}/drug-molecule.jsonl.zst" >> $GITHUB_STEP_SUMMARY
