name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (lock-file enforced)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run unit tests
        run: npm test

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # trufflehog needs git history

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: npm audit (moderate or higher fails)
        run: |
          if [ -f package-lock.json ]; then
            npm audit --audit-level=high || true
          else
            echo "No package-lock.json — skipping audit (run 'npm install' to create one)"
          fi

      # Trufflehog needs different invocation for PR (diff scan) vs push (filesystem
      # scan). Pushing to main has base==head so the diff-mode action fails.
      - name: Trufflehog secret scan (PR diff)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: Trufflehog secret scan (push filesystem)
        if: github.event_name == 'push'
        run: |
          docker run --rm -v "$PWD:/repo" trufflesecurity/trufflehog:latest \
            filesystem /repo --only-verified --fail

  schema-validate:
    # Sciweon-specific: ensures entity schemas can be imported without runtime
    # errors and have required fields (provenance + confidence-related).
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Schema sanity import
        run: |
          node --input-type=module -e "
          import('./src/lib/schemas/compound.js').then(m => {
            if (!m.COMPOUND_SCHEMA) throw new Error('COMPOUND_SCHEMA missing');
            console.log('compound OK');
          });
          import('./src/lib/schemas/bioactivity.js').then(m => {
            if (!m.BIOACTIVITY_SCHEMA) throw new Error('BIOACTIVITY_SCHEMA missing');
            console.log('bioactivity OK');
          });
          import('./src/lib/schemas/trial.js').then(m => {
            if (!m.TRIAL_SCHEMA) throw new Error('TRIAL_SCHEMA missing');
            console.log('trial OK');
          });
          import('./src/lib/schemas/paper.js').then(m => {
            if (!m.PAPER_SCHEMA) throw new Error('PAPER_SCHEMA missing');
            console.log('paper OK');
          });
          "

      - name: Primary-data deny-list check
        # Enforces primary-data-only policy: certain field names
        # are reserved for secondary processed data and MUST NOT reappear
        # in entity schemas. V0.4 may re-introduce equivalent fields as
        # Sciweon-computed under different names (sciweon_confidence,
        # retraction_doi, etc.), but the upstream secondary names stay out.
        run: |
          set -e
          deny="concepts|fields_of_study|retraction_reason|retraction_reason_categories|confidence_score|institutions|s2FieldsOfStudy|influentialCitationCount|tldr|keywords|subcellularLocation|dbReferences"
          if grep -nE "(${deny})\\s*:" src/lib/schemas/*.js; then
            echo "::error::Secondary-data field reintroduced in schema. See primary-data-only policy."
            exit 1
          fi
          # S2 secondary fields must never enter adapter code as ACTUAL usage.
          # Match the field name only when it is being read/assigned (followed
          # by `:`, `.`, `(`, `[`, or `,` in a code position). This avoids
          # false positives on the PRIMARY-DATA contract docstring that lists
          # the rejected field names in prose.
          if grep -nE "\\b(fieldsOfStudy|s2FieldsOfStudy|influentialCitationCount|tldr)[:.\\[(]" scripts/ingestion/adapters/semanticscholar-adapter.js; then
            echo "::error::S2 secondary ML / proprietary field consumed in adapter code. Restrict to PRIMARY_FIELDS allowlist."
            exit 1
          fi
          # Adapter pass-through bans
          if grep -nE "confidence_score\\s*:\\s*raw\\." scripts/ingestion/adapters/*.js; then
            echo "::error::ChEMBL native confidence_score must not be passed through. Use bioactivity-scorer.js."
            exit 1
          fi
          if grep -nE "\\.author\\?\\.display_name" scripts/ingestion/adapters/openalex-adapter.js; then
            # Allowed only as the SECOND operand of a nullish coalescing fallback
            # for raw_author_name. Forbid using it as primary (first operand).
            if grep -nE "^[^/]*name:\\s*[a-zA-Z]+\\.author\\?\\.display_name" scripts/ingestion/adapters/openalex-adapter.js; then
              echo "::error::OpenAlex display_name must not be the primary author name. Use raw_author_name."
              exit 1
            fi
          fi
          if grep -nE "\\.institutions[^\\w].*\\.display_name" scripts/ingestion/adapters/openalex-adapter.js; then
            echo "::error::OpenAlex institution.display_name (entity-resolved) must not be consumed. Use raw_affiliation_strings."
            exit 1
          fi
          # UniProt secondary curator classifications must not be consumed as
          # code. Filter out comment-line matches (line content starts with
          # whitespace then `*` or `//`).
          uniprot_matches=$(grep -nE "\\b(keywords|subcellularLocation|dbReferences|features)[:.\\[(]" scripts/ingestion/adapters/uniprot-adapter.js || true)
          uniprot_code_matches=$(echo "$uniprot_matches" | grep -vE ":\\s*\\*|:\\s*//" || true)
          if [ -n "$uniprot_code_matches" ]; then
            echo "::error::UniProt curator secondary field consumed in adapter. Restrict to PRIMARY_FIELDS allowlist."
            echo "$uniprot_code_matches"
            exit 1
          fi
          echo "Primary-data invariant holds."
