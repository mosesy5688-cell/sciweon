name: Factory 2/4 Process

# Stage 2 of 4: download baseline from R2, run compound + bioactivity
# enrichers in parallel, upload enriched bundle to R2. Triggers stage 3
# only on Stage 1 success (workflow_run conclusion check).

on:
  workflow_run:
    workflows:
      - 'Factory 1/4 Harvest'
      - 'Factory Strategic Harvest (FDA-approved subset)'
      - 'Factory Seed Corpus Add'
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: factory-pipeline
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  stage-2-process:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      # PR-FAERS-KEY: the openFDA api_key. Keyless = 1,000 req/day (FAERS blows
      # the cap after ~1,000 records -> 429 -> error-as-empty silent-loss). Keyed
      # = ~120,000/day. The pre-flight gate below HARD-FAILS the prod job if this
      # secret is absent (the code itself stays warn-degrade for local runs).
      OPENFDA_API_KEY: ${{ secrets.OPENFDA_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      # PROD HARD-STOP (part 1): string-presence check ONLY, NO network. openFDA
      # is fetched in this stage (fda-enricher + compound-faers-enricher); a
      # missing key would silently truncate FAERS to ~3% in prod. Fail loud here
      # rather than degrade silently. (factory-1's openfda adapter is non-V2 and
      # skipped, so only factory-2 needs this gate.)
      - name: Pre-flight - require OPENFDA_API_KEY
        run: |
          if [ -z "${OPENFDA_API_KEY}" ]; then
            echo "::error::OPENFDA_API_KEY secret is absent. openFDA keyless = 1,000 req/day -> FAERS silently truncates. Provision the secret before running stage 2."
            exit 1
          fi
          echo "OPENFDA_API_KEY present (length ${#OPENFDA_API_KEY}) -- keyed openFDA enabled."
      - name: Run stage 2
        run: node scripts/factory/stage-2-process.js
      - name: Upload stage-2 log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-2-process-log
          path: output/linked/*.jsonl
          retention-days: 7
          if-no-files-found: warn
