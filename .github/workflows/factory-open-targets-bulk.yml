name: Factory Open Targets Bulk

# Cycle 23 PR-OT-1 (probe infra) + PR-OT-3 (ingest) + PR-OT-5 (cron automation).
#
# Three jobs:
#   probe          - PR-OT-1 release discovery + DuckDB DESCRIBE (manual only)
#   check-version  - PR-OT-5 pre-flight release-changed gate (cron + manual)
#   ingest         - PR-OT-3 drug + target + disease extracts (gated by check-version)
#
# PR-OT-5 automation locks 3 architect hard rails:
#   Rail 1 (no-broken-windows): check-version exits clean success on unchanged
#     release; ingest job skipped via `if`. No red CI noise on idle Sundays.
#   Rail 2 (bidirectional convergence): cursor write at end of ingest covers
#     BOTH schedule-triggered AND workflow_dispatch (manual override) paths,
#     so subsequent Sunday probes see the just-stamped release and short-circuit.
#   Rail 3 (defensive mirror handling): check-version verifies EBI drug_molecule
#     directory has actual Parquet part files (not 404 / empty) before
#     declaring release ready. Mirror-still-syncing case treated as
#     changed=false; re-attempt next Sunday rather than crash mid-ingest.

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'OT release version (blank = auto-detect latest from EBI mirror)'
        required: false
        default: ''
      dry_run:
        description: 'Dry-run ingest (no R2 writes)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
  schedule:
    # Sunday 03:00 UTC. Frequency: weekly check; idempotent if release unchanged.
    # Captures new OT release within 7 days of EBI mirror availability;
    # ~89/90 weekly checks are O(1) text-compare no-ops.
    - cron: '0 3 * * 0'

permissions:
  contents: read

env:
  R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  probe:
    # PR-OT-1 probe is dev/debug only. Skip on automated schedule to keep
    # cron run noise minimal; operators trigger manually for OT release
    # foundation-doc-correction work.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install deps
        run: npm ci
      - name: Discover latest release + datasets
        run: node scripts/factory/open-targets-probe.js | tee /tmp/ot-probe.json
      - name: Install DuckDB CLI
        run: |
          set -e
          curl -sL https://github.com/duckdb/duckdb/releases/download/v1.1.3/duckdb_cli-linux-amd64.zip -o /tmp/duckdb.zip
          unzip -q /tmp/duckdb.zip -d /tmp
          /tmp/duckdb --version
      - name: Probe drug_molecule Parquet schema
        run: |
          set -e
          RELEASE=$(node -e "console.log(require('/tmp/ot-probe.json').latest_release)")
          echo "Using release: ${RELEASE}"
          BASE="https://ftp.ebi.ac.uk/pub/databases/opentargets/platform/${RELEASE}/output/drug_molecule"
          FNAME=$(curl -sL "${BASE}/" | grep -oE 'part-[a-z0-9-]+-c000\.snappy\.parquet' | head -1)
          if [ -z "$FNAME" ]; then
            echo "::error::no Parquet part files found in ${BASE}/"
            exit 1
          fi
          echo "First part file: ${FNAME}"
          curl -sL -o /tmp/drug_molecule.parquet "${BASE}/${FNAME}"
          ls -la /tmp/drug_molecule.parquet
          echo "--- DESCRIBE ---"
          /tmp/duckdb -c "DESCRIBE SELECT * FROM '/tmp/drug_molecule.parquet';"
          echo "--- ROW COUNT (1 partition) ---"
          /tmp/duckdb -c "SELECT COUNT(*) AS rows FROM '/tmp/drug_molecule.parquet';"
          echo "--- 3 SAMPLE ROWS ---"
          /tmp/duckdb -c "SELECT * FROM '/tmp/drug_molecule.parquet' LIMIT 3;"
      - name: Probe additional OT table schemas (PR-OT-3b + PR-OT-3b2 + PR-OT-3b4)
        # PR-OT-3b: drug-side tables drug_mechanism_of_action + drug_warning
        # PR-OT-3b2/3b3: clinical_* family (clinical_indication / clinical_report /
        # clinical_target) that replaced drug_indication + known_drug in OT 26.03
        # PR-OT-3b4 (this PR): adds `target` to discover OT's native target table
        # schema. Required for Phase 1.4 target SID stamping infrastructure -- OT
        # target carries UniProt accessions in proteinIds STRUCT array, removing
        # the need for an external Ensembl->UniProt bridge. The probe DESCRIBE
        # output is used to write the Phase 1.4-pre SQL extraction (subsequent PR).
        run: |
          set -e
          RELEASE=$(node -e "console.log(require('/tmp/ot-probe.json').latest_release)")
          BASE="https://ftp.ebi.ac.uk/pub/databases/opentargets/platform/${RELEASE}/output"
          TABLES="drug_mechanism_of_action drug_warning clinical_indication clinical_report clinical_target target disease"
          for table in $TABLES; do
            echo ""
            echo "============================================"
            echo "=== Probing ${table}"
            echo "============================================"
            # PR-OT-3b3: regex now matches BOTH Parquet emit patterns OT uses:
            #   1. Spark-style multi-partition (drug_* tables):
            #      part-NNNNN-UUID-c000.snappy.parquet (one file per partition)
            #   2. Single-file Parquet (clinical_* tables in 26.03):
            #      <table_name>.parquet
            # The two alternatives are non-overlapping (the first requires the
            # `part-` prefix and `c000.snappy.parquet` suffix; the second is a
            # bare lowercase identifier with `.parquet` suffix and no hyphen).
            FNAME=$(curl -sL "${BASE}/${table}/" | grep -oE '(part-[a-z0-9-]+-c000\.snappy\.parquet|[a-z][a-zA-Z0-9_]*\.parquet)' | head -1)
            if [ -z "$FNAME" ]; then
              echo "::warning::no Parquet part files in ${table}; OT ${RELEASE} may not expose this dataset"
              continue
            fi
            curl -sL -o "/tmp/${table}.parquet" "${BASE}/${table}/${FNAME}"
            ls -la "/tmp/${table}.parquet"
            echo "--- ${table} DESCRIBE ---"
            /tmp/duckdb -c "DESCRIBE SELECT * FROM '/tmp/${table}.parquet';"
            echo "--- ${table} ROW COUNT (1 partition) ---"
            /tmp/duckdb -c "SELECT COUNT(*) AS rows FROM '/tmp/${table}.parquet';"
            echo "--- ${table} 2 SAMPLE ROWS ---"
            /tmp/duckdb -c "SELECT * FROM '/tmp/${table}.parquet' LIMIT 2;"
          done
      - name: Probe report summary
        if: always()
        run: |
          echo "## Open Targets PR-OT-1 probe report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat /tmp/ot-probe.json >> $GITHUB_STEP_SUMMARY || echo '{"error": "probe did not run"}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  check-version:
    # PR-OT-5 Rail 1+2+3: pre-flight version gate. Compares EBI latest
    # release against R2 cursor's stored release_version. Outputs
    # `changed=true|false` consumed by ingest job's `if` conditional.
    # Manual override: if workflow_dispatch.inputs.release_version is
    # non-empty, bypass comparison + force changed=true (Rail 2 convergence
    # still holds since ingest writes cursor at end regardless of trigger).
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
      release: ${{ steps.compare.outputs.release }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install deps
        run: npm ci
      - name: Compare EBI vs R2 cursor release (PR-OT-5)
        id: compare
        env:
          MANUAL_RELEASE: ${{ github.event.inputs.release_version }}
        run: |
          set -e
          # Rail 2 manual override branch
          if [ -n "$MANUAL_RELEASE" ]; then
            echo "Manual dispatch with release=${MANUAL_RELEASE} -- bypassing version check"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "release=${MANUAL_RELEASE}" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Auto detect EBI latest
          node scripts/factory/open-targets-probe.js > /tmp/ot-probe.json
          LATEST=$(node -e "console.log(require('/tmp/ot-probe.json').latest_release)")
          echo "EBI latest release: ${LATEST}"
          # Rail 3 defensive upstream-ready probe: ensure drug_molecule Parquet
          # files actually present (not mid-sync 404 / empty directory)
          BASE="https://ftp.ebi.ac.uk/pub/databases/opentargets/platform/${LATEST}/output"
          PARQUET_COUNT=$(curl -sL "${BASE}/drug_molecule/" | grep -cE '(part-[a-z0-9-]+-c000\.snappy\.parquet|[a-z][a-zA-Z0-9_]*\.parquet)' || true)
          if [ "$PARQUET_COUNT" -eq 0 ]; then
            echo "::warning::Upstream release ${LATEST} listed but drug_molecule Parquet files not yet present (mirror sync incomplete). Treating as changed=false; retry next Sunday."
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "release=${LATEST}" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Upstream readiness verified: ${PARQUET_COUNT} Parquet file(s) in drug_molecule directory"
          # Fetch R2 cursor stored release_version
          PRIOR_RELEASE=$(node -e "
            const {S3Client, GetObjectCommand} = require('@aws-sdk/client-s3');
            const s3 = new S3Client({region:'auto', endpoint:process.env.R2_ENDPOINT, credentials:{accessKeyId:process.env.R2_ACCESS_KEY_ID, secretAccessKey:process.env.R2_SECRET_ACCESS_KEY}});
            s3.send(new GetObjectCommand({Bucket:process.env.R2_BUCKET, Key:'state/open-targets-cursor.json'})).then(async r => {
              const text = await new Promise((res, rej) => { let buf=''; r.Body.on('data',c=>buf+=c); r.Body.on('end',()=>res(buf)); r.Body.on('error',rej); });
              const cursor = JSON.parse(text);
              console.log(cursor.release_version || '');
            }).catch(() => console.log(''));
          ")
          echo "R2 cursor release_version: ${PRIOR_RELEASE:-<none>}"
          if [ "$LATEST" = "$PRIOR_RELEASE" ]; then
            echo "No new release. R2 cursor at ${PRIOR_RELEASE}; skipping ingest (Rail 1 clean success)."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Release transition: ${PRIOR_RELEASE:-<none>} -> ${LATEST}. Triggering ingest."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          echo "release=${LATEST}" >> $GITHUB_OUTPUT
      - name: Summary
        if: always()
        run: |
          echo "## PR-OT-5 check-version" >> $GITHUB_STEP_SUMMARY
          echo "- changed: ${{ steps.compare.outputs.changed }}" >> $GITHUB_STEP_SUMMARY
          echo "- release: ${{ steps.compare.outputs.release }}" >> $GITHUB_STEP_SUMMARY

  ingest:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install deps
        run: npm ci
      - name: Resolve release version
        id: release
        run: |
          set -e
          # PR-OT-5: prefer check-version output to avoid re-probing EBI.
          RELEASE="${{ needs.check-version.outputs.release }}"
          echo "Using release from check-version: ${RELEASE}"
          echo "release=${RELEASE}" >> $GITHUB_OUTPUT
      - name: Install DuckDB CLI + zstd
        run: |
          set -e
          curl -sL https://github.com/duckdb/duckdb/releases/download/v1.1.3/duckdb_cli-linux-amd64.zip -o /tmp/duckdb.zip
          unzip -q /tmp/duckdb.zip -d /tmp
          /tmp/duckdb --version
          # PR-OT-3a hotfix: native zstd CLI for compression. zstd-codec
          # WASM fallback OOMs on ~16MB inputs (drug_molecule 26.03 size).
          # Rust FFI in lib/zstd-helper.js is not built in GHA ubuntu-latest.
          sudo apt-get update -qq
          sudo apt-get install -y -qq zstd
          zstd --version
      - name: Download 6 OT drug-side Parquet datasets (PR-OT-3c)
        # PR-OT-3c: download all 6 tables needed for the multi-table JOIN.
        # Per [[researcher_needs_anchor]] decision 2026-05-24: researcher use
        # cases require trial-level evidence under each indication, hence
        # clinical_report is in scope (not deferred to a follow-up PR).
        # Each table's directory listing is walked with the PR-OT-3b3 regex
        # that matches both Spark multi-partition (`part-*-c000.snappy.parquet`)
        # and single-file (`<name>.parquet`) emission patterns.
        run: |
          set -e
          BASE="https://ftp.ebi.ac.uk/pub/databases/opentargets/platform/${{ steps.release.outputs.release }}/output"
          TABLES="drug_molecule drug_mechanism_of_action drug_warning clinical_indication clinical_report clinical_target"
          for table in $TABLES; do
            mkdir -p "/tmp/${table}"
            FILES=$(curl -sL "${BASE}/${table}/" | grep -oE '(part-[a-z0-9-]+-c000\.snappy\.parquet|[a-z][a-zA-Z0-9_]*\.parquet)' | sort -u)
            if [ -z "$FILES" ]; then
              echo "::error::no Parquet files found in ${table}"
              exit 1
            fi
            for fname in $FILES; do
              curl -sL -o "/tmp/${table}/${fname}" "${BASE}/${table}/${fname}"
            done
            COUNT=$(ls /tmp/${table}/ | wc -l)
            echo "Downloaded ${table}: ${COUNT} file(s)"
          done
      - name: Multi-table JOIN extract -> JSONL via DuckDB (PR-OT-3c)
        # 6-table JOIN executed from scripts/factory/sql/open-targets-join.sql.
        # SQL kept out of workflow YAML so Art 5.1 line cap applies cleanly
        # to both files and so the SQL is reviewable as a unit (76 lines).
        # Two distinct join-key patterns in one query:
        #   - drug_* tables use plural chemblIds[] via list_contains
        #   - clinical_* tables use singular drugId via direct equi-join
        # clinical_report nests via 2-hop correlated subquery through
        # clinical_indication.clinicalReportIds[].
        run: |
          set -e
          /tmp/duckdb < scripts/factory/sql/open-targets-join.sql
          LINES=$(wc -l < /tmp/drug-enriched.jsonl)
          BYTES=$(wc -c < /tmp/drug-enriched.jsonl)
          echo "JSONL lines: ${LINES}"
          echo "JSONL bytes: ${BYTES}"
          if [ "$LINES" -eq 0 ]; then
            echo "::error::DuckDB JOIN extract produced zero lines"
            exit 1
          fi
          echo "--- first record (truncated 800 chars) ---"
          head -1 /tmp/drug-enriched.jsonl | head -c 800
          echo ""
      - name: Transform + upload to R2
        run: |
          set -e
          ARGS="--jsonl=/tmp/drug-enriched.jsonl --release=${{ steps.release.outputs.release }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/factory/open-targets-harvest.js $ARGS
      - name: Download target Parquet (PR-SID-1.4-pre.1a)
        run: |
          set -e
          BASE="https://ftp.ebi.ac.uk/pub/databases/opentargets/platform/${{ steps.release.outputs.release }}/output"
          mkdir -p /tmp/target
          FILES=$(curl -sL "${BASE}/target/" | grep -oE '(part-[a-z0-9-]+-c000\.snappy\.parquet|[a-z][a-zA-Z0-9_]*\.parquet)' | sort -u)
          if [ -z "$FILES" ]; then echo "::error::no target Parquet files"; exit 1; fi
          for fname in $FILES; do curl -sL -o "/tmp/target/${fname}" "${BASE}/target/${fname}"; done
          echo "Downloaded target: $(ls /tmp/target/ | wc -l) file(s)"
      - name: Target extract via DuckDB (PR-SID-1.4-pre.1a)
        run: |
          set -e
          /tmp/duckdb < scripts/factory/sql/open-targets-target.sql
          LINES=$(wc -l < /tmp/target-enriched.jsonl)
          echo "Target JSONL lines: ${LINES}"
          if [ "$LINES" -eq 0 ]; then echo "::error::target extract produced zero lines"; exit 1; fi
      - name: Target transform + upload to R2
        run: |
          set -e
          ARGS="--jsonl=/tmp/target-enriched.jsonl --release=${{ steps.release.outputs.release }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/factory/open-targets-target-harvest.js $ARGS
      - name: Download disease Parquet (PR-SID-1.6b-pre.1a)
        # PR-SID-1.6b-pre.1a: OT disease table ingest. Disease.id is the
        # mixed-namespace EFO_xxxxxxx / MONDO_xxxxxxx string per
        # SCIWEON_BULK_ACQUISITION_TRACKER.md schema verification. Subsequent
        # PR 1.6b-pre.1b disease-linker performs Sciweon-layer namespace split;
        # PR 1.6b stamper uses EFO-primary + MONDO-fallback multi-canon
        # (analogous to Phase 1.4 target UniProt+Ensembl precedent).
        run: |
          set -e
          BASE="https://ftp.ebi.ac.uk/pub/databases/opentargets/platform/${{ steps.release.outputs.release }}/output"
          mkdir -p /tmp/disease
          FILES=$(curl -sL "${BASE}/disease/" | grep -oE '(part-[a-z0-9-]+-c000\.snappy\.parquet|[a-z][a-zA-Z0-9_]*\.parquet)' | sort -u)
          if [ -z "$FILES" ]; then echo "::error::no disease Parquet files"; exit 1; fi
          for fname in $FILES; do curl -sL -o "/tmp/disease/${fname}" "${BASE}/disease/${fname}"; done
          echo "Downloaded disease: $(ls /tmp/disease/ | wc -l) file(s)"
      - name: Disease extract via DuckDB (PR-SID-1.6b-pre.1a)
        run: |
          set -e
          /tmp/duckdb < scripts/factory/sql/open-targets-disease.sql
          LINES=$(wc -l < /tmp/disease-enriched.jsonl)
          echo "Disease JSONL lines: ${LINES}"
          if [ "$LINES" -eq 0 ]; then echo "::error::disease extract produced zero lines"; exit 1; fi
      - name: Disease transform + upload to R2
        run: |
          set -e
          ARGS="--jsonl=/tmp/disease-enriched.jsonl --release=${{ steps.release.outputs.release }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/factory/open-targets-disease-harvest.js $ARGS
      - name: Ingest report summary
        if: always()
        run: |
          echo "## OT Ingest report (release ${{ steps.release.outputs.release }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/drug-enriched.jsonl ]; then
            echo "- JSONL lines: $(wc -l < /tmp/drug-enriched.jsonl)" >> $GITHUB_STEP_SUMMARY
            echo "- JSONL bytes: $(wc -c < /tmp/drug-enriched.jsonl)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- Dry-run: ${{ github.event.inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
          echo "- R2 key: processed/bulk/open-targets/${{ steps.release.outputs.release }}/drug-enriched.jsonl.zst" >> $GITHUB_STEP_SUMMARY
