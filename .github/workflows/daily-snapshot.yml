name: Daily Snapshot

# Daily entity graph snapshot to R2.
# Continuous accumulation of daily snapshots builds a time-series dataset
# that enables retroactive analysis (citation trajectories, retraction
# lags, FDA approval shifts, cross-source disagreement evolution).
#
# Reuses Stage 4 logic (download aggregated from R2 → integrity check →
# build snapshot → upload + latest pointer). Stage 4 runs as part of the
# Mon+Thu factory chain; this workflow Daily-ticks the other 5 days so
# every calendar day has a snapshot under the same date.

on:
  schedule:
    # 00:00 UTC daily. Factory chain (Mon+Thu 02:00 UTC) overwrites same-day
    # snapshot with fresh enriched data when it runs.
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: factory-pipeline
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build & upload snapshot (Stage 4 logic)
        # Single source of truth: stage-4-upload.js downloads aggregated
        # from R2 processed/aggregated/<latest>/, runs integrity check,
        # snapshot-builder, snapshot-uploader, updates snapshots/latest.json.
        run: node scripts/factory/stage-4-upload.js
