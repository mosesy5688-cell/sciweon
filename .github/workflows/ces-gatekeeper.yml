name: CES Gatekeeper

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ces-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  enforce-compliance:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run CES Check
        # V0.5.x policy (2026-05-15): default STRICT applies. We do NOT pass
        # CES_ENGLISH_STRICT here — any explicit '0' would silently re-open
        # the WARN escape hatch that already let a CJK docstring ship past
        # this gate once. Script default is STRICT (check_compliance.py).
        run: python3 scripts/check_compliance.py
