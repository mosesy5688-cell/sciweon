name = "sciweon"
compatibility_date = "2026-05-14"
main = "src/worker.ts"

[assets]
directory = "./dist"
binding = "ASSETS"

# R2 bucket binding — gives the Worker direct read access to the snapshot
# bucket without round-tripping through the public CDN. The bucket
# `sciweon-prod` is the same bucket snapshot-uploader.js writes daily
# snapshots into (env R2_BUCKET in GHA secrets).
#
# The Cloudflare dashboard binding must use the same `binding` name below.
# Local dev (`wrangler dev`) reads `bucket_name` directly.
[[r2_buckets]]
binding = "SCIWEON_R2"
bucket_name = "sciweon-prod"
