name: Factory Harvest

# 8-phase pipeline: harvest new compound CID range -> enrich -> link ->
# validate -> snapshot -> upload to R2 -> advance cursor.
#
# Cron is Mon + Thu at 02:00 UTC. With --limit=5000 per run, this adds
# ~40K compounds/month. Cursor in R2 (state/harvest-cursor.json) ensures
# each run picks up where the previous one stopped - no duplicate fetch.

on:
  schedule:
    - cron: '0 2 * * 1,4'
  workflow_dispatch:
    inputs:
      manual_start_cid:
        description: 'Override cursor.next_cid for this run (0 = use cursor)'
        required: false
        default: '0'
      limit:
        description: 'Compounds to fetch this run (default 5000)'
        required: false
        default: '5000'

concurrency:
  group: factory-harvest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HARVEST_LIMIT: ${{ github.event.inputs.limit || '5000' }}
      MANUAL_START_CID: ${{ github.event.inputs.manual_start_cid || '0' }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      S2_API_KEY: ${{ secrets.S2_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run factory pipeline
        run: npm run harvest

      - name: Upload orchestrator report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-result
          path: |
            output/orchestrator-result.json
            output/harvest-*.log
          retention-days: 30
