name: Factory Snapshot Completeness

# Cycle 22 PR-L4 — Layer 4 daily snapshot completeness scanner + on-demand
# backfill. Defends scale-in-time leg of triple-lock principle (see
# SCIWEON_BULK_ACQUISITION_TRACKER.md Governing principle section).
#
# Daily cron at 11:00 UTC (after typical F4 completion ~10:30 UTC, 30-min
# buffer for slow runs). Emits R2 state/snapshot-completeness.json + exit
# code per severity tier. Hard-fails (exit 1) on missing-in-last-7d.
#
# Manual dispatch supports backfilling a specific missing date by reading
# nearest-prior aggregated bundle + replaying snapshot-builder + uploader
# with TARGET_DATE override + SKIP_LATEST_SWAP=1.

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      backfill_date:
        description: 'YYYY-MM-DD to backfill (blank = scan only)'
        required: false
        default: ''
      window_days:
        description: 'Scan window in days (default 60, max 365)'
        required: false
        default: '60'
      dry_run:
        description: 'Dry-run backfill (no R2 writes)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: read

env:
  R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  completeness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run snapshot completeness scan
        run: node scripts/factory/snapshot-completeness.js --window=${{ github.event.inputs.window_days || '60' }}

  backfill:
    # PR-L4c: if: always() prefix so backfill proceeds even when
    # completeness job exits non-zero. Previous gating ("needs: completeness"
    # without always()) created a chicken-and-egg: audit reports missing
    # date → user dispatches backfill → completeness fails (still missing)
    # → backfill never runs (blocked by needs). Backfill is the corrective
    # action AGAINST completeness failure, not a step that requires it to
    # succeed first. Ordering (audit-then-backfill) preserved by needs;
    # always() lifts the success requirement.
    if: always() && github.event_name == 'workflow_dispatch' && github.event.inputs.backfill_date != ''
    needs: completeness
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run snapshot backfill
        run: |
          ARGS="--date=${{ github.event.inputs.backfill_date }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/factory/snapshot-backfill.js $ARGS
