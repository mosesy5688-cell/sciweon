name: Factory 2/4 Process

# Stage 2 of 4: download baseline from R2, run compound + bioactivity
# enrichers in parallel, upload enriched bundle to R2. Triggers stage 3
# only on Stage 1 success (workflow_run conclusion check).

on:
  workflow_run:
    workflows: ['Factory 1/4 Harvest']
    types: [completed]
  workflow_dispatch:

concurrency:
  group: factory-pipeline
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  stage-2-process:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - name: Run stage 2
        run: node scripts/factory/stage-2-process.js
      - name: Upload stage-2 log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-2-process-log
          path: output/linked/*.jsonl
          retention-days: 7
          if-no-files-found: warn
