name: Factory 1/4 Harvest

# Stage 1 of 4: incremental harvest from upstream, cross-source linking,
# upload raw + baseline to R2. Triggers stage 2 on success.
#
# Cron Mon + Thu 02:00 UTC. Cursor in R2 (state/harvest-cursor.json)
# tracks next CID; never duplicates fetched range.

on:
  schedule:
    - cron: '0 2 * * 1,4'
  workflow_dispatch:
    inputs:
      manual_start_cid:
        description: 'Override cursor.next_cid for this run (0 = use cursor)'
        required: false
        default: '0'
      limit:
        description: 'Compounds to fetch this run (default 5000)'
        required: false
        default: '5000'

concurrency:
  group: factory-pipeline
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  stage-1-harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      HARVEST_LIMIT: ${{ github.event.inputs.limit || '5000' }}
      MANUAL_START_CID: ${{ github.event.inputs.manual_start_cid || '0' }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - name: Run stage 1
        run: node scripts/factory/stage-1-harvest.js
      - name: Upload stage-1 log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-1-harvest-log
          path: |
            output/compounds/*.jsonl
            output/linked/*.jsonl
          retention-days: 7
          if-no-files-found: warn
