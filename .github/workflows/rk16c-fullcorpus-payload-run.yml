name: RK-16C Full-Corpus Payload Run (D-132 un-inerted carrier; DO NOT DISPATCH until founder D-133 gate)

# RK-16C FULL-CORPUS PAYLOAD RUN -- DISPATCH-ONLY CARRIER (D-132 un-inert of the
# D-129 wiring).
#
# BUILD-ONLY / DO NOT MERGE until the founder D-133 gate / DO NOT DISPATCH. This
# file only DELIVERS a run channel for the ratified-lock-gated payload runner
# (run-fullcorpus.mjs --full-run). The runner code is already merged + audited and
# is NOT modified by this PR.
#
# CAPABILITY != AUTHORIZATION. Un-inerting this carrier (pinning the audited runner
# SHA, committing the byte-identical lock fixture, wiring the payload-read capability
# flag/env) only makes the run TECHNICALLY POSSIBLE. It does NOT authorize a run.
# The actual per-run authorization is a SEPARATE founder act (see the capability
# labeling and single-use boundary sections below), not anything expressed by this
# YAML.
#
# WHAT THE RUNNER ENFORCES (app-layer, fail-before-network):
#   node scripts/spikes/rk16c/run-fullcorpus.mjs --full-run --lock <lock-file>
#     --authorized-for-payload-read
#   - the lock FILE sha256 must equal the pinned value (else fail-before-network);
#   - schema / snapshot_id / payload_key / payload sha256 (compressed+uncompressed)
#     / row-count / trust-anchor pins must all bind;
#   - an EXPLICIT payload-read capability grant is required (the flag + the env
#     below); the artifact's OWN authorized_for_payload_read is NOT trusted;
#   - root seal + sibling manifest are reconciled BEFORE any payload GET;
#   - exact read-only allowlist = seal + sibling + payload ONLY (no List/latest/
#     discovery, no Put/Delete); the gzip is stream-decoded (no decompressed file).
#
# === DUAL-SHA MODEL ===
# The workflow FILE is introduced by this PR head commit; the CODE it executes is
# pinned to the AUDITED RUNNER SHA below via the checkout `ref:`. The
# workflow-definition SHA (github.sha) and the runner SHA (the checked-out commit)
# are DIFFERENT by design. A verification step FAILS the run if the checked-out
# commit != AUDITED_RUNNER_SHA, BEFORE any credential use or R2 client construction.
#   AUDITED_RUNNER_SHA = 1be2fbbc8e2baedfa516933d5b675019046e0aa3
#     -- the D-132 audited execution-tree SHA, which contains the unchanged D-130
#     payload-runner code + the byte-identical payload-gate-input lock fixture +
#     the byte-preservation attributes.
#
# === COMMITTED LOCK FIXTURE (byte-identical, UNRATIFIED) ===
# The lock file is a COMMITTED repo fixture at RK16C_RATIFIED_LOCK_PATH below. It is
# an EXACT BYTE COPY of the audited D-104 two-manifest candidate-lock artifact (run
# 28786290133, artifact rk16c-two-manifest-candidate-lock-UNRATIFIED). Its internal
# fields are UNCHANGED: status=UNRATIFIED, founder_approved=false,
# authorized_for_payload_read=false, candidate_lock_schema=rk16c-fullcorpus-lock-v2.
# A fail-closed step below validates its size (2781 bytes) and sha256
# (EXPECTED_LOCK_SHA256) BEFORE any R2/credential use.
#
# === TRIGGER ===
# FOUNDER-TRIGGERED ONLY: workflow_dispatch with ZERO inputs. The audited runner
# SHA, the lock path, and the command are all HARDCODED below. No push /
# pull_request / pull_request_target / repository_dispatch / schedule /
# workflow_call / release / deployment.
#
# === SINGLE-USE BOUNDARY (stated honestly) ===
# This workflow is NOT global-single-use by YAML alone. run_attempt==1 prevents
# reruns of ONE run, NOT a new workflow_dispatch. The one-shot boundary is enforced
# by: founder dispatch authorization + exact tag + exact environment policy +
# exact-run identity audit + exact pending-deployment approval + no second dispatch
# + mandatory D-138 post-run deactivation. Do NOT read single-use as guaranteed by
# run_attempt, by (now-removed) typed inputs, or by re-inerting main alone.

on:
  workflow_dispatch:

# Least privilege: read-only. No write scopes; no id-token (OIDC NOT used).
permissions:
  contents: read

# Static concurrency group (no dynamic / user-input key). Serializes runs;
# concurrent runs are not allowed.
concurrency:
  group: rk16c-fullcorpus-payload-run
  cancel-in-progress: false

env:
  # The AUDITED RUNNER SHA the checkout `ref:` pins and the Verify step enforces.
  AUDITED_RUNNER_SHA: 1be2fbbc8e2baedfa516933d5b675019046e0aa3
  # The committed byte-identical lock fixture path (a repo file in this PR).
  RK16C_RATIFIED_LOCK_PATH: scripts/spikes/rk16c/locks/RK16C_FULLCORPUS_LOCK.payload-gate-input.json
  # The required size==2781 sha256 of that committed lock fixture; the validation
  # step below fails-closed if the committed file does not match.
  EXPECTED_LOCK_SHA256: e6383dfe6df0895b827ab85c6d970418c86d87f9e5749d7bc850a4e313c909bd

jobs:
  payload-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # NEW dedicated environment (the human execution-approval boundary). NOT the
    # rk16c-manifest-preflight environment. This environment is CREATED later at the
    # founder D-133 gate, not by this PR.
    environment: rk16c-payload-run
    steps:
      # 1. EVENT GUARD -- FIRST, before checkout/creds. Only workflow_dispatch may
      #    run; any other event fails closed before any code/credential is touched.
      - name: Event guard (only workflow_dispatch may run)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: |
          echo "Refusing event ${{ github.event_name }} (only workflow_dispatch). Fail-closed BEFORE checkout/creds."
          exit 1

      # 2. RUN-ATTEMPT GUARD -- before checkout/creds. A re-run (attempt != 1) must
      #    NOT silently re-execute against production; fail closed.
      - name: Run-attempt guard (only attempt 1 may run)
        if: ${{ github.run_attempt != '1' }}
        run: |
          echo "Refusing run_attempt=${{ github.run_attempt }} (only attempt 1). Fail-closed BEFORE checkout/creds."
          exit 1

      # 3. CHECKOUT pinned to the AUDITED RUNNER SHA (NOT PR head / main / HEAD / a
      #    movable tag). persist-credentials:false so the git token drops.
      - name: Checkout audited runner commit (SHA-pinned)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: 1be2fbbc8e2baedfa516933d5b675019046e0aa3
          persist-credentials: false

      # 4. SHA VERIFICATION -- fail-before-network. Prove the executed code is the
      #    audited runner SHA. Runs BEFORE any credential use / R2 client. No secret
      #    is printed.
      - name: Verify checked-out commit == AUDITED_RUNNER_SHA (fail-before-network)
        run: |
          CHECKED_OUT_SHA="$(git rev-parse HEAD)"
          echo "workflow_definition_sha (github.sha) = ${{ github.sha }}"
          echo "checked_out_runner_sha               = ${CHECKED_OUT_SHA}"
          echo "expected AUDITED_RUNNER_SHA          = ${AUDITED_RUNNER_SHA}"
          if [ "${CHECKED_OUT_SHA}" != "${AUDITED_RUNNER_SHA}" ]; then
            echo "FAIL: checked-out commit != AUDITED_RUNNER_SHA -- refusing before any credential use or R2 client construction."
            exit 1
          fi
          echo "OK: runner SHA matches the audited runner SHA."

      # 5. LOCK-FIXTURE VALIDATION -- fail-before-network. The committed lock fixture
      #    MUST match exactly (size 2781 bytes AND sha256 == EXPECTED_LOCK_SHA256).
      #    Fails closed BEFORE Node/npm and BEFORE any R2/credential use if the file
      #    is missing, wrong size, or wrong hash.
      - name: Validate committed payload-gate-input lock fixture (size + sha256, fail-closed)
        run: |
          LOCK_PATH="${RK16C_RATIFIED_LOCK_PATH}"
          echo "lock_path           = ${LOCK_PATH}"
          echo "expected_size_bytes = 2781"
          echo "expected_sha256     = ${EXPECTED_LOCK_SHA256}"
          if [ ! -f "${LOCK_PATH}" ]; then
            echo "FAIL: lock fixture not present at ${LOCK_PATH}. Fail-closed BEFORE any R2/credential use."
            exit 1
          fi
          ACTUAL_SIZE="$(wc -c < "${LOCK_PATH}" | tr -d '[:space:]')"
          if [ "${ACTUAL_SIZE}" != "2781" ]; then
            echo "FAIL: lock fixture size ${ACTUAL_SIZE} != 2781. Fail-closed BEFORE any R2/credential use."
            exit 1
          fi
          ACTUAL_SHA="$(sha256sum "${LOCK_PATH}" | awk '{print $1}')"
          if [ "${ACTUAL_SHA}" != "${EXPECTED_LOCK_SHA256}" ]; then
            echo "FAIL: lock fixture sha256 ${ACTUAL_SHA} != ${EXPECTED_LOCK_SHA256}. Fail-closed BEFORE any R2/credential use."
            exit 1
          fi
          echo "OK: committed lock fixture matches size 2781 and sha256 ${EXPECTED_LOCK_SHA256}."

      # 6. SETUP NODE (node 24), SHA-pinned. After all guards + SHA/lock verification.
      - name: Setup Node 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      # 7. Install dependencies (locked).
      - name: Install dependencies (npm ci)
        run: npm ci

      # 8. EXACT ratified-lock-gated payload run. The runner fails-before-network on
      #    any pin mismatch or without the explicit grant. R2 secrets via env; the
      #    object-level read-only-to-three-keys bound is app-layer (exact-readonly-guard).
      #
      #    CAPABILITY != AUTHORIZATION: the `--authorized-for-payload-read` flag and
      #    the `RK16C_D134_PAYLOAD_READ_AUTHORIZED: '1'` env below are TECHNICAL
      #    CAPABILITY ENABLEMENT, NOT FOUNDER AUTHORIZATION. They only let the runner
      #    construct the read; they do NOT constitute permission to read the payload.
      #    The actual per-run payload-read AUTHORIZATION is the D-136 in-chat founder
      #    ruling PLUS the exact pending-deployment (environment) approval performed
      #    AFTER the D-135 exact-run identity audit -- neither of which is expressed
      #    by this YAML.
      - name: RK-16C ratified-lock-gated full-corpus payload run
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RK16C_D134_PAYLOAD_READ_AUTHORIZED: '1'
        run: node scripts/spikes/rk16c/run-fullcorpus.mjs --full-run --lock "${RK16C_RATIFIED_LOCK_PATH}" --authorized-for-payload-read

      # 9. Upload ONLY the supplemental envelope / row-count-hash report. NEVER payload
      #    bytes / bioactivities / credentials / env dumps. Finite retention.
      - name: Upload supplemental envelope report (report only)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rk16c-fullcorpus-payload-run-envelope
          path: scripts/spikes/rk16c/results/RK16C_D129_FULLRUN_ENVELOPE.json
          retention-days: 14
          if-no-files-found: warn
