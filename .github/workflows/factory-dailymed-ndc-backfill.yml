name: Factory DailyMed NDC Backfill

# PR-RXN-1b-pre: one-shot offline backfiller for DailyMed drug_label records
# missing `ndcs[]` (introduced by PR-RXN-1b-pre adapter shape change).
#
# Reads live aggregated drug-labels.jsonl from R2, hydrates each record's
# `ndcs[]` via fetchNdcs(setid), writes enriched dataset to a STAGING R2
# key (processed/backfill/dailymed-ndcs/<date>/). The live aggregated
# bundle is NEVER overwritten by this workflow -- operator reviews the
# staging output before promotion.
#
# Architect 2026-05-28 spec: manual workflow_dispatch only (no cron); GHA
# runner provides controlled rate-limit envelope vs operator's local
# network.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max number of setids to backfill (default: all)'
        required: false
        default: ''
      dry_run:
        description: 'Skip R2 upload (manifest still logged)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: read

env:
  R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install deps
        run: npm ci
      - name: Install zstd CLI
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zstd
      - name: Run DailyMed NDC backfill
        run: |
          set -e
          ARGS=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit=${{ github.event.inputs.limit }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          node scripts/factory/backfill-dailymed-ndcs.js $ARGS
      - name: Summary
        if: always()
        run: |
          echo "## PR-RXN-1b-pre DailyMed NDC backfill" >> $GITHUB_STEP_SUMMARY
          echo "- limit: ${{ github.event.inputs.limit || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "- dry-run: ${{ github.event.inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
