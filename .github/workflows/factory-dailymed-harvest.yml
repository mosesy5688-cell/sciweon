name: Factory DailyMed Harvest

# Manual trigger for DailyMed adapter v2 (Sciweon V0.5.4).
#
# Produces DrugLabel entities from FDA/NLM DailyMed SPL labels.
# Writes output to R2 processed/dailymed/{run_id}/drug-labels.jsonl.
# Advances R2 cursor at state/incremental-cursors/dailymed.json.
#
# This workflow is workflow_dispatch-only. V0.7 factory-incremental-daily.yml
# will absorb DailyMed as one of 14+ parallel matrix workers and supersede this
# standalone workflow when the fan-out/fan-in infrastructure is built.
#
# Typical use:
#   - First run: leave since_date blank → adapter bootstraps from 7 days ago
#   - Subsequent runs: leave blank → cursor drives the since date
#   - Re-harvest a specific date range: set since_date explicitly
#   - Smoke test: set limit=10 + dry_run=true

on:
  workflow_dispatch:
    inputs:
      since_date:
        description: 'Fetch labels published on or after YYYY-MM-DD (blank = use R2 cursor)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — fetch and count labels without writing to R2'
        required: false
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'
      limit:
        description: 'Max labels to fetch per run (0 = unlimited)'
        required: false
        default: '0'

concurrency:
  group: factory-dailymed
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dailymed-harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run DailyMed harvest
        run: |
          ARGS=""
          SINCE="${{ github.event.inputs.since_date }}"
          DRY="${{ github.event.inputs.dry_run }}"
          LIMIT="${{ github.event.inputs.limit }}"

          [ -n "$SINCE" ]           && ARGS="$ARGS --since=$SINCE"
          [ "$DRY"   = "true" ]     && ARGS="$ARGS --dry-run"
          [ -n "$LIMIT" ] && [ "$LIMIT" != "0" ] && ARGS="$ARGS --limit=$LIMIT"

          node scripts/factory/dailymed-harvest.js $ARGS

      - name: Upload output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dailymed-harvest-output-${{ github.run_id }}
          path: output/linked/drug-labels.jsonl
          retention-days: 7
          if-no-files-found: warn
