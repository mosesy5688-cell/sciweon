name: Factory 1/4 Harvest

# Stage 1 of 4: PubChem compound harvest (cursor-based) runs in parallel with
# 17 supplementary source adapters (incremental sinceToken). Fan-in merges
# all adapter deltas into the cumulative R2 store. Triggers stage 2 on success.
#
# Cron 10:05 UTC daily — staggered per GHA reliability guidance (avoid :00).
# PubChem and adapter jobs run concurrently; wall time ~1.5h (PubChem gate).
# Adapter continue-on-error: true so transient API failures don't block stage 2.

on:
  schedule:
    - cron: '5 10 * * *'
  workflow_dispatch:
    inputs:
      manual_start_cid:
        description: 'Override cursor.next_cid for this run (0 = use cursor)'
        required: false
        default: '0'
      limit:
        description: 'Compounds to fetch this run (default 5000)'
        required: false
        default: '5000'
      source_filter:
        description: 'Single adapter source to run (blank = all 17)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — no R2 writes (adapters only)'
        type: choice
        options: ['false', 'true']
        default: 'false'

concurrency:
  group: factory-pipeline
  cancel-in-progress: false

permissions:
  contents: read

env:
  R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:

  pubchem:
    name: PubChem Harvest
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      HARVEST_LIMIT: ${{ github.event.inputs.limit || '5000' }}
      MANUAL_START_CID: ${{ github.event.inputs.manual_start_cid || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - name: Setup Python for RDKit
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install Python deps (RDKit etc.)
        run: pip install -r requirements.txt
      - name: Descriptor self-test (fixture-drift gate)
        run: python scripts/factory/descriptor-precompute.py --self-test
      - name: Run PubChem harvest (includes descriptor-precompute batch before cross-source-linker)
        run: node scripts/factory/stage-1-harvest.js
      - name: Upload harvest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-1-harvest-log
          path: |
            output/compounds/*.jsonl
            output/linked/*.jsonl
          retention-days: 7
          if-no-files-found: warn

  adapters:
    name: Adapter [${{ matrix.source }}]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        source:
          - chembl
          - clinicaltrials
          - ctis
          - dailymed
          - pubmed
          - openalex
          - openfda
          - retraction-watch
          - uniprot
          - unichem
          - rxnorm
          - semanticscholar
          - pubchem-bioassay
          - kegg
          - orangebook
          - who-atc
          - nci-thesaurus
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run adapter worker
        run: |
          SOURCE="${{ matrix.source }}"
          FILTER="${{ inputs.source_filter }}"
          if [ -n "$FILTER" ] && [ "$FILTER" != "$SOURCE" ]; then
            echo "[ADAPTER:$SOURCE] Skipped by source_filter=$FILTER"
            exit 0
          fi
          RUN_ID=$(date -u +%Y-%m-%d)
          ARGS="--source=$SOURCE --run-id=$RUN_ID"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/factory/incremental-worker.js $ARGS

  merge-adapters:
    name: Merge Adapters (fan-in)
    needs: adapters
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run incremental merge
        run: |
          RUN_ID=$(date -u +%Y-%m-%d)
          ARGS="--run-id=$RUN_ID"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/factory/incremental-merge-all.js $ARGS

  health-summary:
    name: Adapter Cron Health Summary
    needs: [adapters, merge-adapters]
    if: always()              # run even if some adapters or fan-in failed
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write           # gh issue create / close
      actions: read           # gh run view (read own run's jobs)
    env:
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      GH_TOKEN: ${{ github.token }}
      RUN_ID: ${{ github.run_id }}
      CANARY_REPORT_PATH: './output/adapter-cron-report.json'
      CANARY_STATE_LOCAL: './output/linked/adapter-cron-state.json'
      CANARY_ISSUE_LABEL: 'factory-cron-health'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Download previous cron-health state from R2 (optional)
        run: |
          node -e "import('./scripts/factory/lib/r2-cache-bridge.js').then(m => m.downloadCache('adapter-cron-state.json')).catch(e => console.warn('cache download (non-fatal):', e.message))"
      - name: Collect adapter cron outcomes
        run: node scripts/factory/adapter-cron-health-collect.js
      - name: Apply decisions + manage Issues
        run: node scripts/factory/canary-issue-manage.js
      - name: Upload state to R2
        if: always()
        run: |
          node -e "import('./scripts/factory/lib/r2-cache-bridge.js').then(m => m.uploadCache('adapter-cron-state.json')).catch(e => console.warn('cache upload (non-fatal):', e.message))"
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adapter-cron-health-report
          path: |
            output/adapter-cron-report.json
            output/linked/adapter-cron-state.json
          retention-days: 30
          if-no-files-found: warn
