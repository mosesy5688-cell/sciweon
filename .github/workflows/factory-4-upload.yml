name: Factory 4/4 Upload

# Stage 4 of 4: download aggregated from R2, integrity-check, build dated
# snapshot, upload to R2 snapshots/<date>/, update latest pointer.

on:
  workflow_run:
    workflows: ['Factory 3/4 Aggregate']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      # P-8 GAP-C: OPTIONAL exact-run binding. When SET -> MANUAL mode: F4
      # downloads processed/aggregated/<aggregated_run_id>/ DIRECTLY (never the
      # latest pointer), attests the source bytes + asserts the MANUAL_ONLY /
      # backfill_only policy triplet, then publishes that EXACT artifact (P-8R2).
      # When EMPTY (default) -> AUTO mode: the on:workflow_run publication-policy
      # gate (GAP-A) follows the latest pointer and NO-OPs on a MANUAL_ONLY run.
      aggregated_run_id:
        description: 'P-8 MANUAL mode: exact processed/aggregated/<run_id> to publish (empty = AUTO mode, follow latest pointer + policy gate)'
        required: false
        type: string
        default: ''

concurrency:
  group: factory-pipeline
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  stage-4-upload:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - name: Run stage 4
        env:
          # P-8 GAP-C: empty on the on:workflow_run (AUTO) path; the operator-
          # supplied exact run id on the workflow_dispatch (MANUAL) path.
          AGGREGATED_RUN_ID: ${{ github.event.inputs.aggregated_run_id }}
        run: node scripts/factory/stage-4-upload.js
      - name: Upload stage-4 log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-4-upload-log
          path: |
            snapshots/*/manifest.json
            output/linked/*.jsonl
          retention-days: 30
          if-no-files-found: warn
