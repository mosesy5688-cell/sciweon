name: Daily Snapshot

# Layer 4 time-series clock — daily entity graph snapshot to R2.
# Per 2026-05-13 strategic plan: time is the only physically non-copyable
# resource. Every missed day widens competitor catch-up window.
#
# Activates when R2 secrets are configured. Until then, runs on manual
# workflow_dispatch to build local snapshots (Layer 4 clock starts ticking
# locally even without R2; uploads backfill once credentials are set).

on:
  schedule:
    # 00:00 UTC daily. Adjust if pipeline runs need to complete first.
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: daily-snapshot
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build snapshot (local)
        # Snapshot output expected under ./output/linked/ — produced by
        # the upstream pipeline. If absent on a fresh runner, the builder
        # logs absences and produces a minimal manifest.
        run: node scripts/factory/snapshot-builder.js

      - name: Upload to R2 (skipped if secrets unset)
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: node scripts/factory/snapshot-uploader.js
